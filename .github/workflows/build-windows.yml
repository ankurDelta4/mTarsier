name: Build Windows

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build tsr binary
        working-directory: src-tauri
        run: cargo build --release --bin tsr

      - name: Copy tsr to binaries
        working-directory: src-tauri
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String "host:").ToString().Split(" ")[1].Trim()
          New-Item -ItemType Directory -Force -Path binaries | Out-Null
          Copy-Item "target/release/tsr.exe" "binaries/tsr-$triple.exe"
          Write-Host "Copied tsr to binaries/tsr-$triple.exe"

      - name: Regenerate icon
        working-directory: src-tauri
        shell: pwsh
        run: |
          magick convert icons/128x128@2x.png -define icon:auto-resize=256,128,64,48,32,16 icons/icon.ico
          Write-Host "Regenerated icon.ico"

      - name: Build Tauri app
        run: pnpm run tauri build --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mTarsier-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
